# ──────────────────────────────────────────────────────────────────────────────
# CI: Build & Push wan-2.6-t2i-runpod-worker to GHCR
#
# Triggers on push to main (Dockerfile or handler changes) and workflow_dispatch.
# Pushes to ghcr.io/elabs-ai/elabs-server/wan26-t2i-runpod:latest
# Requires secret: GHCR_TOKEN (write:packages PAT for elabs-ai org)
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - requirements-runpod.txt
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: latest)"
        type: string
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/elabs-ai/elabs-server/wan26-t2i-runpod
  TAG: ${{ inputs.image_tag || 'latest' }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: elabs-ai
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
